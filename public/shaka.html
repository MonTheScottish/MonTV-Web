<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MonTV Web Player</title>
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/shaka-player.compiled.min.js"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    video {
      width: 100%;
      height: 100%;
      display: block;
    }
    #error {
      color: #ef4444;
      font-family: sans-serif;
      font-size: 14px;
      position: absolute;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <div id="error" style="display: none;"></div>

  <script>
    async function init() {
      // Install built-in polyfills
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        showError("Trình duyệt không hỗ trợ Shaka Player.");
        return;
      }

      const video = document.getElementById('video');
      const player = new shaka.Player(video);

      // Parse query params
      const urlParams = new URLSearchParams(window.location.search);
      const hasControls = urlParams.get('controls') === 'true';
      if (hasControls) {
        video.setAttribute('controls', 'true');
      } else {
        video.removeAttribute('controls');
        // Click to toggle play/pause
        video.addEventListener('click', () => {
          if (video.paused) {
            video.play().catch(console.error);
          } else {
            video.pause();
          }
        });
      }

      // Notify parent on user interaction (to keep React overlay active)
      const notifyInteraction = () => {
        window.parent.postMessage({ type: 'userInteraction' }, '*');
      };
      document.addEventListener('mousemove', notifyInteraction);
      document.addEventListener('click', notifyInteraction);

      // Sync state back to parent window
      video.addEventListener('play', () => {
        window.parent.postMessage({ type: 'videoState', isPlaying: true }, '*');
      });
      video.addEventListener('pause', () => {
        window.parent.postMessage({ type: 'videoState', isPlaying: false }, '*');
      });
      video.addEventListener('playing', () => {
        window.parent.postMessage({ type: 'videoState', isPlaying: true }, '*');
      });

      // Handle play/pause and volume commands from parent window
      window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'control') {
          if (e.data.action === 'play') {
            video.play().catch(console.error);
          } else if (e.data.action === 'pause') {
            video.pause();
          } else if (e.data.action === 'togglePlay') {
            if (video.paused) {
              video.play().catch(console.error);
            } else {
              video.pause();
            }
          } else if (e.data.action === 'setVolume') {
            video.volume = e.data.value;
            if (video.volume > 0) {
              video.muted = false;
            }
          }
        }
      });

      // Listen for error events
      player.addEventListener('error', (event) => {
        console.error('Shaka Player error:', event.detail);
        const code = (event.detail && event.detail.code) || 0;
        const category = (event.detail && event.detail.category) || 0;
        window.parent.postMessage({
          type: 'error',
          code,
          category,
          message: 'Shaka Player error'
        }, '*');
        showError("Lỗi phát luồng DRM.");
      });

      const videoUrl = urlParams.get('videoUrl');
      const keysParam = urlParams.get('keys');
      const keyIdParam = urlParams.get('keyId');
      const keyParam = urlParams.get('key');

      if (!videoUrl) {
        showError("Thiếu tham số videoUrl.");
        return;
      }

      // Configure DRM / ClearKey
      const clearKeys = {};
      if (keysParam) {
        // Format: key_id_hex:key_hex
        const parts = keysParam.split(':');
        if (parts.length === 2) {
          clearKeys[parts[0]] = parts[1];
        }
      } else if (keyIdParam && keyParam) {
        clearKeys[keyIdParam] = keyParam;
      }

      const keyserver = urlParams.get('keyserver');
      const certUrl = urlParams.get('certUrl');

      const drmConfig = {};
      if (keyserver) {
        // iOS Safari uses FairPlay; everything else uses Widevine. Let the
        // platform decide. Both schemes carry through to the serverCertificateUri
        // when present.
        if (shaka.util.Platform.isApple()) {
          drmConfig['servers'] = {
            'com.apple.streamingkeydelivery': keyserver
          };
          if (certUrl) {
            drmConfig['advanced'] = {
              'com.apple.streamingkeydelivery': {
                serverCertificateUri: certUrl
              }
            };
          }
        } else {
          drmConfig['servers'] = {
            'com.widevine.alpha': keyserver
          };
        }
      }
      if (Object.keys(clearKeys).length > 0) {
        drmConfig['clearKeys'] = clearKeys;
      }

      if (Object.keys(drmConfig).length > 0) {
        player.configure({ drm: drmConfig });
      }

      // Apply muted parameter if requested
      const isMuted = urlParams.get('muted') === 'true';
      if (isMuted) {
        video.muted = true;
      }

      // Load video
      try {
        await player.load(videoUrl);
        console.log('Video loaded successfully.');
        // Ensure play triggers, fallback to muted if browser blocks autoplay
        video.play().catch((err) => {
          console.warn("Autoplay blocked, falling back to muted play:", err);
          video.muted = true;
          video.play().catch(console.error);
        });
      } catch (e) {
        console.error('Error loading video:', e);
        showError("Lỗi tải luồng phát.");
      }
    }

    function showError(msg) {
      const errEl = document.getElementById('error');
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
