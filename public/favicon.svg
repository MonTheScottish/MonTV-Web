<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e295d" />
      <stop offset="100%" stop-color="#0a0f1d" />
    </radialGradient>
    <!-- Frame Gradient -->
    <linearGradient id="frame-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <!-- Screen Glass Gradient -->
    <linearGradient id="screen-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9" />
    </linearGradient>
    <!-- Glow Effect Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bg-glow)" />

  <!-- TV Antennas (Abstract sleek angled lines) -->
  <path d="M190 120 L240 180" stroke="url(#frame-grad)" stroke-width="16" stroke-linecap="round" />
  <path d="M322 120 L272 180" stroke="url(#frame-grad)" stroke-width="16" stroke-linecap="round" />

  <!-- Outer TV Frame with Gradient -->
  <rect x="80" y="160" width="352" height="260" rx="40" fill="none" stroke="url(#frame-grad)" stroke-width="20" filter="url(#neon-glow)" />

  <!-- Inner Screen (Glassmorphic) -->
  <rect x="100" y="180" width="312" height="220" rx="28" fill="url(#screen-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="2" />

  <!-- Channel Icon / Logo Emblem (A stylized glowing "M") -->
  <path d="M160 340 V240 L216 290 L272 240 M312 240 V340" stroke="url(#frame-grad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#neon-glow)" />

  <!-- Small sleek power dot (blue glow) -->
  <circle cx="380" cy="360" r="8" fill="#3b82f6" filter="url(#neon-glow)" />
</svg>